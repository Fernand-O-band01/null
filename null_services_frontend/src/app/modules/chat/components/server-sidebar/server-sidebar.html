<div class="w-[72px] h-full bg-[#1E1F22] flex-shrink-0 flex flex-col items-center py-3 gap-2 overflow-y-auto hidden-scrollbar pt-3">
  
  <div class="group relative flex items-center justify-center w-full cursor-pointer">
    <div class="absolute left-0 w-1 h-10 bg-white rounded-r-lg opacity-100"></div>
    <div class="w-12 h-12 bg-[#5865F2] rounded-[16px] flex items-center justify-center text-white transition-all hover:bg-indigo-400">
      <i class="fa-brands fa-discord text-2xl"></i>
    </div>
  </div>

  <div class="w-8 h-[2px] bg-[#35363C] rounded-full my-1"></div>

  @for (server of servers; track server.id) {
    <div class="group relative flex items-center justify-center w-full cursor-pointer mt-2">
      <div class="absolute left-0 w-1 bg-white rounded-r-lg opacity-0 transition-all duration-300 h-2 group-hover:opacity-100 group-hover:h-5"></div>
      
      <div class="w-12 h-12 bg-[#313338] text-[#DBDEE1] group-hover:text-white rounded-[24px] group-hover:rounded-[16px] group-hover:bg-[#5865F2] transition-all duration-300 flex items-center justify-center font-semibold text-[18px] relative shadow-sm">
        
        {{ server.name?.charAt(0) | uppercase }}

        <div class="absolute -bottom-1 -right-1 bg-[#F23F42] border-[4px] border-[#1E1F22] text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[20px] text-center flex items-center justify-center">
          2
        </div>
      </div>
    </div>
  }

  <div class="w-8 h-[2px] bg-[#35363C] rounded-full my-2"></div>

  <div class="group relative flex items-center justify-center w-full cursor-pointer">
    <div class="absolute left-0 w-1 bg-white rounded-r-lg opacity-0 transition-all duration-300 h-2 group-hover:opacity-100 group-hover:h-5"></div>
    <div class="w-12 h-12 bg-[#313338] text-[#23A559] group-hover:bg-[#23A559] group-hover:text-white rounded-[24px] group-hover:rounded-[16px] transition-all duration-300 flex items-center justify-center text-2xl font-light">
      +
    </div>
  </div>
    
  <div class="group relative flex items-center justify-center w-full cursor-pointer mt-2">
    <div class="absolute left-0 w-1 bg-white rounded-r-lg opacity-0 transition-all duration-300 h-2 group-hover:opacity-100 group-hover:h-5"></div>
    <div class="w-12 h-12 bg-[#313338] text-[#23A559] group-hover:bg-[#23A559] group-hover:text-white rounded-[24px] group-hover:rounded-[16px] transition-all duration-300 flex items-center justify-center">
      
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm2.19 12.19L6 18l3.81-8.19L18 6l-3.81 8.19zM12 10.9c-.61 0-1.1.49-1.1 1.1s.49 1.1 1.1 1.1c.61 0 1.1-.49 1.1-1.1s-.49-1.1-1.1-1.1z"/>
      </svg>

    </div>
  </div>

</div>
