<div class="flex-1 flex items-center justify-between h-full pr-3 relative">
  
@if (isStatusMenuOpen) {
    <app-user-panel-pop-up 
      [username]="username"
      [currentStatus]="currentStatus"
      (statusSelected)="onStatusChange($event)">
    </app-user-panel-pop-up>
  }

  <div (click)="toggleStatusMenu()" class="flex items-center gap-2 hover:bg-[#3f4147] p-1 rounded-md cursor-pointer transition-colors flex-1 min-w-0 mr-2">
    
    <div class="relative w-8 h-8 rounded-full bg-[#5865F2] flex items-center justify-center text-white font-bold text-sm flex-shrink-0">
      {{ username ? username.charAt(0).toUpperCase() : 'U' }}
      
      <div class="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 border-[3px] border-[#232428] rounded-full transition-colors"
           [ngClass]="{
             'bg-[#23a559]': currentStatus === 'ONLINE',
             'bg-[#f0b232]': currentStatus === 'AWAY',
             'bg-[#f23f43]': currentStatus === 'DO_NOT_DISTURB',
             'bg-[#80848e]': currentStatus === 'OFFLINE'
           }">
      </div>
    </div>
    
    <div class="flex flex-col overflow-hidden flex-1 min-w-0">
      <span class="text-white text-sm font-bold truncate leading-none mb-1">{{ username }}</span>
      
      <span class="text-[#B5BAC1] text-[11px] truncate leading-none">
        {{ currentStatus === 'ONLINE' ? 'En línea' :
           currentStatus === 'AWAY' ? 'Ausente' :
           currentStatus === 'DO_NOT_DISTURB' ? 'No molestar' : 'Invisible' }}
      </span>
    </div>
  </div>

  <div class="flex items-center flex-shrink-0">
    <button 
      (click)="$event.stopPropagation(); logout()" 
      title="Cerrar Sesión" 
      class="w-8 h-8 flex items-center justify-center rounded text-[#B5BAC1] hover:bg-[#3f4147] hover:text-[#F23F42] transition-colors focus:outline-none">
      
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
      </svg>

    </button>
    <button class="relative w-8 h-8 flex items-center justify-center rounded text-[#B5BAC1] transition-colors group focus:outline-none"
          [class.pointer-events-none]="showSmallPanel"
          [class.opacity-50]="showSmallPanel"
          [class.hover:bg-[#3f4147]]="!showSmallPanel"
          (click)="openSettingsModal()">
          
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.3-.06.61-.06.94s.02.64.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.03-1.58zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
    </svg>
    
    <div class="absolute bottom-full mb-2 px-3 py-1.5 text-xs text-[#B5BAC1] bg-black rounded shadow-lg transition-opacity whitespace-nowrap pointer-events-none"
         [class.opacity-0]="true"
         [class.group-hover:opacity-100]="!showSmallPanel">
      Ajustes de usuario
      <div class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-black"></div>
    </div>
  </button>
  </div>

</div>
